# Pages CMS configuration for hovera.app-website
# Hosted admin UI: https://app.pagescms.org
# Docs: https://pagescms.org/docs

media:
  - name: og
    label: "OG / Banery"
    input: public/og
    output: /og
  - name: public
    label: "Public assets"
    input: public
    output: /

content:
  # ============================================================
  # PRODUKT (5 fields / locale)
  # ============================================================
  - name: product-pl
    label: "Produkt — PL"
    type: collection
    path: src/content/product/pl
    format: yaml-frontmatter
    filename: "{slug}.md"
    view:
      fields: [title, slug]
    fields:
      - { name: slug, label: Slug, type: string, required: true }
      - { name: locale, label: Locale, type: select, default: pl, options: { values: [pl, en, de, fr] } }
      - { name: title, label: "SEO title", type: string, required: true }
      - { name: eyebrow, label: Eyebrow, type: string }
      - { name: headline, label: "Headline (H1)", type: text }
      - { name: subtitle, label: Subtitle, type: text }
      - { name: description, label: "Meta description", type: text }
      - { name: accent, label: "Visual accent", type: select, default: calendar, options: { values: [calendar, passes, invoice, journal, mobile, booking, ai] } }
      - { name: heroImage, label: "Hero image (banner)", type: image }
      - { name: bullets, label: Bullets, type: string, list: true }
      - name: subFeatures
        label: "Sub-features"
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string }
          - { name: body, label: Body, type: text }
      - { name: integrations, label: Integrations, type: string, list: true }
      - { name: pricingNote, label: "Pricing note", type: text }
      - { name: body, label: "Long-form body (opcjonalne)", type: rich-text }

  - name: product-en
    label: "Produkt — EN"

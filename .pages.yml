        list: true
        fields:
          - { name: title, label: Title, type: string }
          - { name: body, label: Body, type: text }
      - { name: integrations, label: Integrations, type: string, list: true }
      - { name: pricingNote, label: "Pricing note", type: text }
      - { name: body, label: "Long-form body (optional)", type: rich-text }

